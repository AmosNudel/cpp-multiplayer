[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway exposes one public HTTP port via PORT (WebSocket).
# Desktop TCP uses a separate TCP proxy -> TCP_PORT (7777).
# Do NOT set PORT or WS_PORT to 7777.

[[deploy.ports]]
port = 7777
protocol = "TCP"
