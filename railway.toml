[build]
builder = "DOCKERFILE"
dockerfilePath = "docker/Dockerfile"

[deploy]
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3

# Railway exposes one public port by default. Set WS_PORT=$PORT in the
# Railway service variables so web clients can reach the WebSocket listener.
# Desktop TCP clients can use Railway's TCP proxy feature on TCP_PORT.

[[deploy.ports]]
port = 7777
protocol = "TCP"

[[deploy.ports]]
port = 7778
protocol = "TCP"
